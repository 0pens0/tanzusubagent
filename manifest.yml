applications:
- name: agent-a2a-alpha
  path: apps/agent-a2a-alpha
  memory: 1024M
  buildpacks:
  - python_buildpack
  - agent_buildpack
  env:
    AGENT_ID: agent-a2a-alpha
    SKILL_RUNNER_MCP_PORT: "8765"
    TANZU_AGENT_ENABLE_DEBUG_UI: "true"
  services:
  - Qwen3.6
  - skill-runner-mcp-local
  sidecars:
  - name: skill-runner
    process_types: [web]
    command: bash /home/vcap/app/skill_runner/start_sidecar.sh
    memory: 128M

- name: agent-a2a-beta
  path: apps/agent-a2a-beta
  memory: 1024M
  buildpacks:
  - python_buildpack
  - agent_buildpack
  env:
    AGENT_ID: agent-a2a-beta
    SKILL_RUNNER_MCP_PORT: "8765"
    TANZU_AGENT_ENABLE_DEBUG_UI: "true"
  services:
  - Qwen3.6
  - skill-runner-mcp-local
  sidecars:
  - name: skill-runner
    process_types: [web]
    command: bash /home/vcap/app/skill_runner/start_sidecar.sh
    memory: 128M
